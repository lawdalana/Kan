services:
  original:
    build:
      context: .
      dockerfile: codes/original/Dockerfile
    environment:
      PORT: "8001"
    ports:
      - "8001:8001"

  kan:
    build:
      context: .
      dockerfile: codes/kan/Dockerfile
    environment:
      PORT: "8002"
    ports:
      - "8002:8002"

  kan-decode:
    build:
      context: .
      dockerfile: codes/kan-decode/Dockerfile
    environment:
      PORT: "8003"
    ports:
      - "8003:8003"

  web-showcase:
    build:
      context: .
      dockerfile: codes/web-showcase/Dockerfile
    ports:
      - "8080:8080"
